name: ci

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Unit tests
        run: go test ./...

      - name: Build binary
        run: go build -o atlantis-mcp ./cmd/atlantis-mcp

      - name: Start Atlantis
        run: docker compose -f docker-compose.e2e.yml up -d

      - name: Wait for Atlantis
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:4141/healthz; then
              echo
              echo "Atlantis is up"
              exit 0
            fi
            sleep 2
          done
          echo "Atlantis did not become healthy in time; logs:"
          docker compose -f docker-compose.e2e.yml logs
          exit 1

      - name: E2E tests
        env:
          MCP_BINARY: ${{ github.workspace }}/atlantis-mcp
          ATLANTIS_URL: http://localhost:4141
        run: go test -tags e2e -v ./e2e/...

      - name: Atlantis logs
        if: always()
        run: docker compose -f docker-compose.e2e.yml logs

      - name: Stop Atlantis
        if: always()
        run: docker compose -f docker-compose.e2e.yml down -v

  publish:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
